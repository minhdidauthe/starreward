<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Tặng Sao</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">
</head>

<body>
    <div class="sidebar">
        <div class="sidebar-brand">
            <i class="fas fa-graduation-cap"></i> StarEdu
        </div>
        <nav class="nav flex-column">
            <a class="nav-link {{ 'active' if request.endpoint == 'main.index' else '' }}"
                href="{{ url_for('main.index') }}">
                <i class="fas fa-home"></i> Trang Chủ
            </a>
            <a class="nav-link {{ 'active' if 'learning' in request.endpoint else '' }}"
                href="{{ url_for('learning.index') }}">
                <i class="fas fa-book"></i> Góc Học Tập
            </a>
            <a class="nav-link {{ 'active' if 'exam' in request.endpoint else '' }}" href="{{ url_for('exam.index') }}">
                <i class="fas fa-file-alt"></i> Góc Thi Cử
            </a>
            <a class="nav-link" href="#">
                <i class="fas fa-lightbulb"></i> Góc Khám Phá
            </a>
        </nav>
    </div>

    <div class="main-content">
        <div class="container-fluid">
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            {% block content %}{% endblock %}
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
