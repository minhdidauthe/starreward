{% extends "base.html" %}

{% block title %}Tạo người dùng mới - Star Reward{% endblock %}

{% block content %}
<div class="container py-4">
    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-0">
                <i class="bi bi-person-plus me-2"></i>Tạo người dùng mới
            </h1>
            <p class="text-muted mb-0">Thêm người dùng mới vào hệ thống</p>
        </div>
        <div>
            <a href="/admin/users" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-2"></i>Quay lại
            </a>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <form method="POST" action="/admin/users/create">
                        <!-- Username -->
                        <div class="mb-3">
                            <label for="username" class="form-label">
                                Tên đăng nhập <span class="text-danger">*</span>
                            </label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="bi bi-person"></i>
                                </span>
                                <input type="text" class="form-control" id="username"
                                       name="username" required minlength="3" maxlength="30"
                                       placeholder="Nhập tên đăng nhập">
                            </div>
                            <div class="form-text">
                                Tên đăng nhập phải có từ 3-30 ký tự
                            </div>
                        </div>

                        <!-- Full Name -->
                        <div class="mb-3">
                            <label for="fullName" class="form-label">
                                Họ và tên <span class="text-danger">*</span>
                            </label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="bi bi-person-badge"></i>
                                </span>
                                <input type="text" class="form-control" id="fullName"
                                       name="fullName" required maxlength="100"
                                       placeholder="Nhập họ và tên">
                            </div>
                        </div>

                        <!-- Email -->
                        <div class="mb-3">
                            <label for="email" class="form-label">
                                Email <span class="text-danger">*</span>
                            </label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="bi bi-envelope"></i>
                                </span>
                                <input type="email" class="form-control" id="email"
                                       name="email" required
                                       placeholder="example@email.com">
                            </div>
                        </div>

                        <!-- Role -->
                        <div class="mb-3">
                            <label for="role" class="form-label">
                                Vai trò <span class="text-danger">*</span>
                            </label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="bi bi-shield-check"></i>
                                </span>
                                <select class="form-select" id="role" name="role" required>
                                    <option value="student" selected>Học sinh</option>
                                    <option value="parent">Phụ huynh</option>
                                    <option value="teacher">Giáo viên</option>
                                    <option value="admin">Quản trị viên</option>
                                </select>
                            </div>
                        </div>

                        <hr class="my-4">

                        <!-- Password -->
                        <div class="mb-3">
                            <label for="password" class="form-label">
                                Mật khẩu <span class="text-danger">*</span>
                            </label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="bi bi-key"></i>
                                </span>
                                <input type="password" class="form-control" id="password"
                                       name="password" required minlength="6"
                                       placeholder="Nhập mật khẩu">
                            </div>
                            <div class="form-text">
                                Mật khẩu phải có ít nhất 6 ký tự
                            </div>
                        </div>

                        <!-- Confirm Password -->
                        <div class="mb-4">
                            <label for="confirmPassword" class="form-label">
                                Xác nhận mật khẩu <span class="text-danger">*</span>
                            </label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="bi bi-key-fill"></i>
                                </span>
                                <input type="password" class="form-control" id="confirmPassword"
                                       name="confirmPassword" required minlength="6"
                                       placeholder="Nhập lại mật khẩu">
                            </div>
                        </div>

                        <!-- Buttons -->
                        <div class="d-flex justify-content-between">
                            <a href="/admin/users" class="btn btn-outline-secondary">
                                <i class="bi bi-x-lg me-2"></i>Hủy
                            </a>
                            <button type="submit" class="btn btn-success">
                                <i class="bi bi-check-lg me-2"></i>Tạo người dùng
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Password validation
document.querySelector('form').addEventListener('submit', function(e) {
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    if (password !== confirmPassword) {
        e.preventDefault();
        alert('Mật khẩu xác nhận không khớp!');
        return false;
    }
});
</script>
{% endblock %}
