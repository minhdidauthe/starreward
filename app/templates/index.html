{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-md-4">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h5 class="card-title mb-0">Thêm Học Sinh Mới</h5>
            </div>
            <div class="card-body">
                <form action="{{ url_for('main.add_student') }}" method="POST">
                    <div class="mb-3">
                        <label for="name" class="form-label">Tên Học Sinh</label>
                        <input type="text" class="form-control" id="name" name="name" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Thêm Học Sinh</button>
                </form>
            </div>
        </div>
    </div>

    <div class="col-md-8">
        <h2 class="mb-4">Danh Sách Học Sinh</h2>
        <div class="row">
            {% for student in students %}
            <div class="col-md-6 mb-4">
                <div class="card reward-card">
                    <div class="card-body">
                        <h5 class="card-title">{{ student.name }}</h5>
                        <p class="card-text">
                            <i class="fas fa-star star-icon"></i> Tổng số sao: {{ student.total_stars }}
                        </p>
                        <p class="card-text">
                            <strong>Cấp độ:</strong> {{ get_reward_level(student.total_stars) }}
                        </p>
                        <a href="{{ url_for('main.student', student_id=student.id) }}" class="btn btn-primary">Xem Chi
                            Tiết</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
