{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h2 class="mb-4">Góc Học Tập</h2>
        <div class="row">
            <!-- Subject Card -->
            <div class="col-md-4 mb-4">
                <div class="card h-100">
                    <div class="card-body text-center">
                        <i class="fas fa-calculator fa-3x text-primary mb-3 floating-icon"></i>
                        <h4 class="card-title">Toán Học</h4>
                        <p class="card-text text-muted">Các bài học về số học, hình học và tư duy logic.</p>
                        <a href="#" class="btn btn-primary">Vào Học</a>
                    </div>
                </div>
            </div>
            <!-- Subject Card -->
            <div class="col-md-4 mb-4">
                <div class="card h-100">
                    <div class="card-body text-center">
                        <i class="fas fa-language fa-3x text-success mb-3 floating-icon"></i>
                        <h4 class="card-title">Tiếng Anh</h4>
                        <p class="card-text text-muted">Từ vựng, ngữ pháp và luyện nghe nói.</p>
                        <a href="#" class="btn btn-primary">Vào Học</a>
                    </div>
                </div>
            </div>
            <!-- Literature -->
            <div class="col-md-4 mb-4">
                <div class="card h-100">
                    <div class="card-body text-center">
                        <i class="fas fa-book-open fa-3x text-warning mb-3 floating-icon"></i>
                        <h4 class="card-title">Tiếng Việt</h4>
                        <p class="card-text text-muted">Tập đọc, chính tả và tập làm văn.</p>
                        <a href="#" class="btn btn-primary">Vào Học</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
